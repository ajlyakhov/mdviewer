<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: blob: https: file:;">
  <title>MD Viewer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="node_modules/highlight.js/styles/github.min.css" id="hljs-light">
  <link rel="stylesheet" href="node_modules/highlight.js/styles/github-dark.min.css" id="hljs-dark">
</head>
<body>
  <div class="app">
    <header class="titlebar">
      <div class="titlebar-drag"></div>
      <div class="toolbar">
        <div class="tabs" id="tabs"></div>
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
          </svg>
          <input type="text" class="search-input" id="search-input" placeholder="Search..." autocomplete="off">
        </div>
      </div>
    </header>

    <main class="content">
      <div class="dropzone" id="dropzone">
        <div class="dropzone-content">
          <button type="button" class="dropzone-icon-btn" id="dropzone-open" title="Open folder">
            <svg class="dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
          </button>
          <p>Drag & drop Markdown files or folders</p>
          <p class="dropzone-hint">or click to open a folder</p>
        </div>
      </div>
      <div class="viewer-container" id="viewer" style="display:none">
        <div class="markdown-body" id="markdown"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay hidden" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="settings-close">×</button>
      </div>
      <div class="modal-body">
        <div class="settings-group">
          <label>Theme</label>
          <select id="theme" class="theme-select">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div class="settings-group">
          <label>File association</label>
          <p class="settings-hint">Set MD Viewer as default app for .md files</p>
          <button type="button" class="btn btn-primary" id="set-default-md">Set as default for .md files</button>
          <p class="settings-result" id="set-default-result"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="node_modules/marked/marked.min.js"></script>
  <script src="node_modules/marked-highlight/lib/index.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="node_modules/mermaid/dist/mermaid.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
