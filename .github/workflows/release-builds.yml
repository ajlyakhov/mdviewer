name: Build Release Binaries

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            build_flag: --mac --arm64
            artifact_name: macos-arm64-binaries
          - os: macos-13
            build_flag: --mac --x64
            artifact_name: macos-x64-binaries
          - os: windows-latest
            build_flag: --win
            artifact_name: windows-binaries
          - os: ubuntu-latest
            build_flag: --linux
            artifact_name: linux-binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set app version from tag
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          node -e "const fs=require('fs'); const files=['package.json','package-lock.json']; for (const file of files) { if (!fs.existsSync(file)) continue; const pkg=JSON.parse(fs.readFileSync(file,'utf8')); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n'); }"

      - name: Set up signing environment
        shell: bash
        env:
          MAC_CERTS_RAW: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD_RAW: ${{ secrets.MAC_CERTS_PASSWORD }}
          WIN_CERTS_RAW: ${{ secrets.WIN_CERTS }}
          WIN_CERTS_PASSWORD_RAW: ${{ secrets.WIN_CERTS_PASSWORD }}
        run: |
          # Only inject signing vars when the secret is actually set —
          # passing an empty string makes electron-builder treat it as a path and fail.
          if [ -n "$MAC_CERTS_RAW" ]; then
            echo "CSC_LINK=$MAC_CERTS_RAW" >> $GITHUB_ENV
            echo "CSC_KEY_PASSWORD=$MAC_CERTS_PASSWORD_RAW" >> $GITHUB_ENV
          fi
          if [ -n "$WIN_CERTS_RAW" ]; then
            echo "WIN_CSC_LINK=$WIN_CERTS_RAW" >> $GITHUB_ENV
            echo "WIN_CSC_KEY_PASSWORD=$WIN_CERTS_PASSWORD_RAW" >> $GITHUB_ENV
          fi

      - name: Build binaries
        env:
          # Disable keychain auto-discovery; signing only happens when CSC_LINK is set above
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist -- ${{ matrix.build_flag }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.snap
            dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read tagged commit message
        id: tagged_commit
        run: |
          {
            echo "message<<EOF"
            git log -1 --pretty=%B
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ github.ref_name }}
          body: ${{ steps.tagged_commit.outputs.message }}
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.snap
            release-artifacts/**/*.tar.gz
